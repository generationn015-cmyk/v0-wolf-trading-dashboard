<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Aggressive wolf face — snarling, forward-facing -->

  <!-- Outer head silhouette -->
  <path d="M60 8 L20 22 L10 50 L14 70 L22 85 L38 100 L60 108 L82 100 L98 85 L106 70 L110 50 L100 22 Z" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1.5"/>

  <!-- Ear left — pointed aggressive -->
  <path d="M20 22 L8 2 L30 18 Z" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1.5"/>
  <!-- Ear inner left -->
  <path d="M20 22 L11 6 L28 20 Z" fill="#7c3aed" opacity="0.6"/>

  <!-- Ear right — pointed aggressive -->
  <path d="M100 22 L112 2 L90 18 Z" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1.5"/>
  <!-- Ear inner right -->
  <path d="M100 22 L109 6 L92 20 Z" fill="#7c3aed" opacity="0.6"/>

  <!-- Face fur markings -->
  <path d="M60 30 L44 42 L38 58 L42 72 L60 78 L78 72 L82 58 L76 42 Z" fill="#0d0d1a"/>

  <!-- Forehead crease / brow furrow — aggression lines -->
  <path d="M44 38 L52 44" stroke="#f59e0b" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M76 38 L68 44" stroke="#f59e0b" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Eyes — amber glowing, narrow aggressive slant -->
  <!-- Left eye -->
  <ellipse cx="44" cy="52" rx="9" ry="6" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1.2"/>
  <ellipse cx="44" cy="52" rx="6" ry="4" fill="#b45309"/>
  <ellipse cx="44" cy="52" rx="3.5" ry="3.5" fill="#000"/>
  <ellipse cx="44" cy="52" rx="7" ry="5" fill="none" stroke="#fbbf24" stroke-width="0.8" opacity="0.6"/>
  <!-- Eye glow -->
  <ellipse cx="44" cy="52" rx="9" ry="6" fill="#f59e0b" opacity="0.12"/>
  <!-- Highlight -->
  <circle cx="46" cy="50" r="1.2" fill="white" opacity="0.8"/>

  <!-- Right eye -->
  <ellipse cx="76" cy="52" rx="9" ry="6" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1.2"/>
  <ellipse cx="76" cy="52" rx="6" ry="4" fill="#b45309"/>
  <ellipse cx="76" cy="52" rx="3.5" ry="3.5" fill="#000"/>
  <ellipse cx="76" cy="52" rx="7" ry="5" fill="none" stroke="#fbbf24" stroke-width="0.8" opacity="0.6"/>
  <ellipse cx="76" cy="52" rx="9" ry="6" fill="#f59e0b" opacity="0.12"/>
  <circle cx="78" cy="50" r="1.2" fill="white" opacity="0.8"/>

  <!-- Brow slant — angry -->
  <path d="M35 46 L53 49" stroke="#f59e0b" stroke-width="2.2" stroke-linecap="round" opacity="0.9"/>
  <path d="M85 46 L67 49" stroke="#f59e0b" stroke-width="2.2" stroke-linecap="round" opacity="0.9"/>

  <!-- Nose bridge -->
  <path d="M56 58 L60 64 L64 58" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Nose -->
  <ellipse cx="60" cy="66" rx="7" ry="5" fill="#111827"/>
  <ellipse cx="60" cy="65" rx="6" ry="4" fill="#1f2937"/>
  <path d="M54 66 Q60 62 66 66" stroke="#374151" stroke-width="1" fill="none"/>

  <!-- Snarl — upper lip pulled back -->
  <path d="M38 78 Q45 74 52 76 Q56 77 60 76 Q64 77 68 76 Q75 74 82 78" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- Teeth — snarling, fangs visible -->
  <path d="M47 76 L44 86 L48 76" fill="white" stroke="#e5e7eb" stroke-width="0.5"/>
  <path d="M54 76 L53 83 L56 76" fill="white" stroke="#e5e7eb" stroke-width="0.5"/>
  <path d="M64 76 L67 83 L66 76" fill="white" stroke="#e5e7eb" stroke-width="0.5"/>
  <path d="M73 76 L76 86 L72 76" fill="white" stroke="#e5e7eb" stroke-width="0.5"/>

  <!-- Lower jaw / chin -->
  <path d="M38 78 Q45 95 60 100 Q75 95 82 78" fill="#0d0d1a" stroke="#374151" stroke-width="1"/>

  <!-- Cheek fur texture -->
  <path d="M22 55 Q30 58 36 60" stroke="#374151" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <path d="M20 62 Q28 64 34 68" stroke="#374151" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <path d="M98 55 Q90 58 84 60" stroke="#374151" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <path d="M100 62 Q92 64 86 68" stroke="#374151" stroke-width="1" stroke-linecap="round" opacity="0.5"/>

  <!-- Amber glow effect around whole head -->
  <circle cx="60" cy="60" r="56" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.15"/>
  <circle cx="60" cy="60" r="52" fill="none" stroke="#f59e0b" stroke-width="0.5" opacity="0.1"/>
</svg>
